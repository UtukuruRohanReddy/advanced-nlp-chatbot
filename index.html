<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLP Chatbot</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <div class="header-content">
                <i class="fas fa-robot"></i>
                <h1>NLP Chatbot</h1>
                <button id="theme-toggle" class="theme-toggle">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>
        
        <main class="chat-main">
            <div class="chat-messages" id="chat-messages">
                <div class="message bot-message">
                    <div class="message-avatar">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="message-content">
                        <p>Hello! I'm your NLP-powered chatbot. How can I help you today?</p>
                    </div>
                </div>
            </div>
            
            <div class="typing-indicator" id="typing-indicator">
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </main>
        
        <footer class="chat-footer">
            <div class="input-container">
                <input 
                    type="text" 
                    id="user-input" 
                    placeholder="Type your message here..."
                    autocomplete="off"
                >
                <button id="send-button" class="send-button">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <div class="quick-actions">
                <button class="quick-action" data-message="Hello">Hello</button>
                <button class="quick-action" data-message="How are you?">How are you?</button>
                <button class="quick-action" data-message="What can you do?">What can you do?</button>
                <button class="quick-action" data-message="Help">Help</button>
            </div>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
